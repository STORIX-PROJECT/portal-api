version: "3.8"

services:
  mysql:
    image: mysql:8.0.32
    container_name: storix-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: storix
      MYSQL_USER: storix_user
      MYSQL_PASSWORD: 1234
    ports:
      - "3308:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: ../..
    container_name: portal-api
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/storix
      SPRING_DATASOURCE_USERNAME: storix_user
      SPRING_DATASOURCE_PASSWORD: 1234

volumes:
  mysql-data: