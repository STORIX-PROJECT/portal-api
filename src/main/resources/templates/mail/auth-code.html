<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body style="margin:0; padding:0; background-color:#f9f9f9;">
<table width="100%" cellpadding="0" cellspacing="0"
       style="background-color:#f9f9f9; padding:40px 0;">
    <tr>
        <td align="center">
            <table width="500" cellpadding="0" cellspacing="0"
                   style="background-color:#ffffff; border-radius:8px;
                          box-shadow:0 2px 8px rgba(0,0,0,0.08); overflow:hidden;">

                <!-- 헤더 -->
                <tr>
                    <td style="background-color:#1a1a2e; padding:28px 40px;">
                        <h1 style="margin:0; color:#ffffff; font-size:22px;
                                   font-family:sans-serif; font-weight:600;"
                            th:text="#{mail.brand.name}">
                        </h1>
                    </td>
                </tr>

                <!-- 본문 -->
                <tr>
                    <td style="padding:40px;">

                        <!-- 제목 -->
                        <h2 style="margin:0 0 12px; color:#1a1a2e; font-size:20px;
                                   font-family:sans-serif; font-weight:600;"
                            th:text="#{mail.auth.title}">
                        </h2>

                        <!-- 설명 -->
                        <p style="margin:0 0 32px; color:#555555; font-size:15px;
                                  font-family:sans-serif; line-height:1.6;"
                           th:text="#{mail.auth.description}">
                        </p>

                        <!-- 인증 코드 박스 -->
                        <div style="background-color:#f4f4f8; border-radius:8px;
                                    padding:28px; text-align:center; margin-bottom:32px;">
                            <p style="margin:0 0 8px; color:#888888; font-size:13px;
                                      font-family:sans-serif;"
                               th:text="#{mail.auth.code.label}">
                            </p>
                            <span th:text="${code}"
                                  style="font-size:36px; font-weight:700; letter-spacing:12px;
                                         color:#1a1a2e; font-family:monospace;">
                            </span>
                        </div>

                        <!-- 만료 안내 -->
                        <p style="margin:0 0 8px; color:#888888; font-size:13px;
                                  font-family:sans-serif;"
                           th:text="#{mail.auth.expire(${expireMinutes})}">
                        </p>

                        <!-- 보안 경고 -->
                        <p style="margin:0; color:#e05555; font-size:13px;
                                  font-family:sans-serif;"
                           th:text="#{mail.auth.warning}">
                        </p>

                    </td>
                </tr>

                <!-- 구분선 -->
                <tr>
                    <td style="padding:0 40px;">
                        <hr style="border:none; border-top:1px solid #eeeeee; margin:0;">
                    </td>
                </tr>

                <!-- Footer -->
                <tr>
                    <td style="padding:24px 40px;">
                        <p style="margin:0; color:#aaaaaa; font-size:12px;
                                  font-family:sans-serif; line-height:1.6;"
                           th:text="#{mail.footer.caution}">
                        </p>
                        <p style="margin:8px 0 0; color:#aaaaaa; font-size:12px;
                                  font-family:sans-serif;"
                           th:text="#{mail.footer.company}">
                        </p>
                    </td>
                </tr>

            </table>
        </td>
    </tr>
</table>
</body>
</html>
